<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
    <link rel="stylesheet" href="../../style/user-settings.css">
</head>
<body>

    <main class="settings-page">
        <section class="settings-card">
            <h1>Account Settings</h1>
            <form id="updateForm">
                <label>Username</label>
                <input type="text" id="username" name="username" placeholder="New username">
                <label>Email</label>
                <input type="email" id="email" name="email" placeholder="New email">
                <label>Password</label>
                <input type="password" id="password" name="password" placeholder="New password">
                <button type="submit">Update Details</button>
            </form>

            <hr>
            <button id="deleteBtn" class="delete-btn">
                Delete Account
            </button>
            <p id="message"></p>
        </section>
    </main>
    <script src="../../js/users/users_settings.js"></script>
</body>
</html>
