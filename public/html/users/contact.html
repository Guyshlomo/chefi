<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../style/ui_status.css">
  <link rel="stylesheet" href="../../style/contact.css">

  <title>Chefi - Contact</title>
</head>

<body>

  <header class="form-header">
    <a href="../../index.html" class="logo">ChefiContact</a>
  </header>

  <main class="contact-page">
    <section class="contact-card">
      <div class="contact-intro">
        <h5>Contact Us</h5>
        <h1>Let’s cook something together</h1>
        <p>
          Have a question about a course, chef, or your account?
          Send us a message and we’ll get back to you soon.
        </p>
      </div>

      <form id="contactForm" action="/contact" method="POST" novalidate>
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" placeholder="Enter your full name">
          <small class="error-message" id="nameError"></small>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Enter your email">
          <small class="error-message" id="emailError"></small>
        </div>

        <div class="form-group">
          <label for="subject">Subject</label>
          <select id="subject" name="subject">
            <option value="">Choose a subject</option>
            <option value="course">Course Question</option>
            <option value="chef">Chef Collaboration</option>
            <option value="support">Technical Support</option>
            <option value="other">Other</option>
          </select>
          <small class="error-message" id="subjectError"></small>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Write your message"></textarea>
          <small class="error-message" id="messageError"></small>
        </div>

        <button type="submit" class="submit-btn">Send Message</button>

        <p id="formStatus" class="form-status"></p>

      </form>

    </section>
  </main>

  <script src="../../js/users/ui_status.js"></script>
  <script src="../../js/users/contact.js"></script>
</body>

</html>
